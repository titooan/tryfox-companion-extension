<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" href="fxqrl.css"/>
	</head>
	<body>
		<div id="copy_feedback" class="copy_feedback" hidden>Copied!</div>
		<div id="qrcode_container" hidden>
			<div class="qr_mode_switch" role="group" aria-label="QR code mode">
				<button id="mode_deeplink" class="mode_button is-active" type="button">DEEPLINK</button>
				<button id="mode_https" class="mode_button" type="button">HTTPS URL</button>
			</div>
			<div class="link_block">
				<div id="active_link_header" class="link_header"></div>
				<div class="link_row">
					<div id="active_link_text" class="link_text"></div>
					<button id="copy_active_link" class="copy_button" type="button" aria-label="Copy current link" title="Copy current link">
						<svg class="button_icon" viewBox="0 0 16 16" aria-hidden="true">
							<path d="M6 2.5h4a1.5 1.5 0 0 1 1.5 1.5v.5h.5A1.5 1.5 0 0 1 13.5 6v7A1.5 1.5 0 0 1 12 14.5H5A1.5 1.5 0 0 1 3.5 13V6A1.5 1.5 0 0 1 5 4.5h.5V4A1.5 1.5 0 0 1 7 2.5Zm0 2h4V4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v.5ZM5 5.5a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5V6a.5.5 0 0 0-.5-.5H5Z"/>
						</svg>
					</button>
				</div>
			</div>
			<div class="qr_image_row">
				<div class="qr_image_block">
					<img id="qrcode_img" class="qrcode" alt="QR code"/>
				</div>
				<div class="qr_actions">
					<button id="copy_qrcode" class="qr_action_button" type="button" aria-label="Copy QR code image" title="Copy QR code image">
						<svg class="qr_action_icon" viewBox="0 0 16 16" aria-hidden="true">
							<path d="M6 2.5h4a1.5 1.5 0 0 1 1.5 1.5v.5h.5A1.5 1.5 0 0 1 13.5 6v7A1.5 1.5 0 0 1 12 14.5H5A1.5 1.5 0 0 1 3.5 13V6A1.5 1.5 0 0 1 5 4.5h.5V4A1.5 1.5 0 0 1 7 2.5Zm0 2h4V4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v.5ZM5 5.5a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5V6a.5.5 0 0 0-.5-.5H5Z"/>
						</svg>
						<span class="qr_action_label">Copy</span>
					</button>
					<button id="save_qrcode" class="qr_action_button" type="button" aria-label="Save QR code image" title="Save QR code image">
						<svg class="qr_action_icon" viewBox="0 0 16 16" aria-hidden="true">
							<path d="M8 1.5a.5.5 0 0 1 .5.5v6.3l1.65-1.65a.5.5 0 1 1 .7.7l-2.5 2.5a.5.5 0 0 1-.7 0l-2.5-2.5a.5.5 0 1 1 .7-.7L7.5 8.3V2a.5.5 0 0 1 .5-.5ZM3 11a.5.5 0 0 1 .5.5V13h9v-1.5a.5.5 0 0 1 1 0V13A1 1 0 0 1 12.5 14h-9A1 1 0 0 1 2.5 13v-1.5A.5.5 0 0 1 3 11Z"/>
						</svg>
						<span class="qr_action_label">Save</span>
					</button>
				</div>
			</div>
		</div>
		<script src="treeherder-url.js"></script>
		<script src="qrcode.js"></script>
		<script src="fxqrl.js"></script>
	</body>
</html>
