name: Extension CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build:ci

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: tryfox-companion-extension
          path: dist/*.xpi
          if-no-files-found: error
