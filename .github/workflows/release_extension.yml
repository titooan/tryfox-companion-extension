name: Release Extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: npm test

      - name: Resolve release version
        id: release_meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="$(node -p 'JSON.parse(require("node:fs").readFileSync("manifest.json", "utf8")).version')"
          fi
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Build extension
        env:
          TRYFOX_EXTENSION_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: npm run build:ci

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.release_meta.outputs.release_version) }}
          name: ${{ steps.release_meta.outputs.release_version }}
          generate_release_notes: true
          files: dist/tryfox-companion-extension-${{ steps.release_meta.outputs.release_version }}.xpi
