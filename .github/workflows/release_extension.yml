name: Release Extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: release_meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="$(node -p 'JSON.parse(require("node:fs").readFileSync("manifest.json", "utf8")).version')"
          fi
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version with release version
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          node -e '
          const fs = require("node:fs");
          const manifestPath = "manifest.json";
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          manifest.version = process.env.RELEASE_VERSION;
          fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + "\n");
          '

      - name: Run tests
        run: npm test

      - name: Build extension
        env:
          TRYFOX_EXTENSION_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: npm run build:ci

      - name: Upload to AMO
        env:
          AMO_ISSUER: ${{ secrets.AMO_ISSUER }}
          AMO_SECRET: ${{ secrets.AMO_SECRET }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          stage_dir="$(mktemp -d)"
          trap 'rm -rf "$stage_dir"' EXIT

          cp manifest.json "$stage_dir/"
          cp -R src popup scanner settings icons "$stage_dir/"
          cp LICENSE README.md "$stage_dir/"

          npx web-ext sign \
            --source-dir "$stage_dir" \
            --artifacts-dir signed-artifacts \
            --channel listed \
            --api-key "$AMO_ISSUER" \
            --api-secret "$AMO_SECRET"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.release_meta.outputs.release_version) }}
          name: ${{ steps.release_meta.outputs.release_version }}
          generate_release_notes: true
          files: dist/tryfox-companion-extension-${{ steps.release_meta.outputs.release_version }}.xpi
